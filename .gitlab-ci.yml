stages:
  - push
  - deploy

include:
  - project: "IUT_INF63/generic-ci"
    ref: "main"
    file:
      - "build/.docker-build.yml"

build-portfolio-image:
  extends: .build-and-push-docker-image
  stage: push
  variables:
    DOCKERFILE_RELATIVE_PATH: "Dockerfile"
    DOCKERFILE_CONTEXT_PATH: "."
    DESTINATION_REGISTRY_IMAGE_NAME: "$CI_REGISTRY_IMAGE"
    DESTINATION_REGISTRY_IMAGE_VERSION: "$CI_COMMIT_REF_SLUG"
    KANIKO_EXTRA_OPTIONS: "--build-arg NEXT_PUBLIC_BASE_PATH=/kubernetes/iut-inf63-portfolio-2025-2026-2a/etveau-portfolio"
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: manual

deploy-portfolio:
  image: "$CI_REGISTRY/iut_inf63/base-cicd/kube-deploy:1.1.0"
  stage: deploy
  variables:
    CONTAINER_NAME: "etveau-portfolio"
    CONTAINER_IMAGE_PATH: "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"
    CONTAINER_HTTP_PORT: "8080"
    DEFAULT_APP_NAMESPACE: "iut-inf63-portfolio-2025-2026-2a"
    CONTAINER_ENV_VAR_PORT: "8080"
    CONTAINER_ENV_VAR_HOSTNAME: "0.0.0.0"
  script:
    - mkdir -p output kube/secrets
    - echo "$KUBE_CA_CRT_B64" | base64 -d > kube/secrets/ca.crt
    - export DEPLOY_TOKEN="${KUBE_NAMESPACE_TOKEN:-$NAMESPACE_TOKEN}"
    - export TARGET_NAMESPACE_RAW="${K8S_NAMESPACE_NAME:-${NAMESPACE_NAME:-$DEFAULT_APP_NAMESPACE}}"
    - export TARGET_NAMESPACE="$(printf '%s' "$TARGET_NAMESPACE_RAW" | tr -d '\r\n')"
    - export PUBLIC_ROUTE_SLUG="${CI_PROJECT_PATH_SLUG:-$CONTAINER_NAME}"
    - '[ -n "$DEPLOY_TOKEN" ] || (echo "Missing KUBE_NAMESPACE_TOKEN or NAMESPACE_TOKEN" && exit 1)'
    - '[ -n "$TARGET_NAMESPACE" ] || (echo "Missing K8S_NAMESPACE_NAME or NAMESPACE_NAME" && exit 1)'
    - |
      cat > kube/config <<EOF
      apiVersion: v1
      kind: Config
      clusters:
      - cluster:
          certificate-authority: ${CI_PROJECT_DIR}/kube/secrets/ca.crt
          server: ${K8S_SERVER_ADDRESS}
        name: codefirst
      contexts:
      - context:
          cluster: codefirst
          namespace: ${TARGET_NAMESPACE}
          user: deployer
        name: codefirst
      current-context: codefirst
      users:
      - name: deployer
        user:
          token: ${DEPLOY_TOKEN}
      EOF
    - export KUBECONFIG="${CI_PROJECT_DIR}/kube/config"
    - |
      cat > output/deployment.yml <<EOF
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ${CONTAINER_NAME}
        namespace: ${TARGET_NAMESPACE}
        labels:
          app: ${CONTAINER_NAME}
      spec:
        replicas: 1
        strategy:
          type: Recreate
        selector:
          matchLabels:
            app: ${CONTAINER_NAME}
        template:
          metadata:
            labels:
              app: ${CONTAINER_NAME}
            annotations:
              deploy_commit_sha: "${CI_COMMIT_SHA}"
              deploy_job_url: "${CI_JOB_URL}"
              deploy_started_at: "${CI_JOB_STARTED_AT}"
          spec:
            containers:
              - name: ${CONTAINER_NAME}
                image: ${CONTAINER_IMAGE_PATH}
                imagePullPolicy: Always
                env:
                  - name: PORT
                    value: "${CONTAINER_ENV_VAR_PORT}"
                  - name: HOSTNAME
                    value: "${CONTAINER_ENV_VAR_HOSTNAME}"
                ports:
                  - name: http-port
                    protocol: TCP
                    containerPort: ${CONTAINER_HTTP_PORT}
                resources:
                  requests:
                    cpu: "0.01"
                    memory: "64M"
                  limits:
                    cpu: "0.10"
                    memory: "128M"
            terminationGracePeriodSeconds: 30
      EOF
    - |
      cat > output/service.yml <<EOF
      apiVersion: v1
      kind: Service
      metadata:
        name: ${CONTAINER_NAME}
        namespace: ${TARGET_NAMESPACE}
      spec:
        selector:
          app: ${CONTAINER_NAME}
        ports:
          - name: http
            protocol: TCP
            port: ${CONTAINER_HTTP_PORT}
            targetPort: http-port
      EOF
    - |
      cat > output/ingress.yml <<EOF
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: ${CONTAINER_NAME}
        namespace: ${TARGET_NAMESPACE}
        annotations:
          nginx.ingress.kubernetes.io/use-regex: "true"
          nginx.ingress.kubernetes.io/rewrite-target: /kubernetes/${TARGET_NAMESPACE}/${CONTAINER_NAME}/\$2
      spec:
        rules:
          - http:
              paths:
                - pathType: ImplementationSpecific
                  path: "/${TARGET_NAMESPACE}/${CONTAINER_NAME}(/|$)(.*)"
                  backend:
                    service:
                      name: ${CONTAINER_NAME}
                      port:
                        number: ${CONTAINER_HTTP_PORT}
                - pathType: ImplementationSpecific
                  path: "/containers/${PUBLIC_ROUTE_SLUG}(/|$)(.*)"
                  backend:
                    service:
                      name: ${CONTAINER_NAME}
                      port:
                        number: ${CONTAINER_HTTP_PORT}
      EOF
    - kubectl apply -f output/deployment.yml
    - kubectl apply -f output/service.yml
    - kubectl apply -f output/ingress.yml
    - kubectl get deployment,pod,service,ingress -n "${TARGET_NAMESPACE}" || true
    - |
      if ! kubectl rollout status deployment/"${CONTAINER_NAME}" -n "${TARGET_NAMESPACE}" --timeout=600s; then
        echo "Rollout failed, collecting diagnostics..."
        kubectl get deployment,pod,service,ingress -n "${TARGET_NAMESPACE}" -o wide || true
        kubectl describe deployment "${CONTAINER_NAME}" -n "${TARGET_NAMESPACE}" || true
        kubectl get pods -n "${TARGET_NAMESPACE}" --sort-by=.metadata.creationTimestamp || true
        POD_NAME="$(kubectl get pods -n "${TARGET_NAMESPACE}" -l app="${CONTAINER_NAME}" -o jsonpath='{.items[-1:].metadata.name}' 2>/dev/null || true)"
        AVAILABLE_REPLICAS="$(kubectl get deployment "${CONTAINER_NAME}" -n "${TARGET_NAMESPACE}" -o jsonpath='{.status.availableReplicas}' 2>/dev/null || echo 0)"
        if [ "${AVAILABLE_REPLICAS:-0}" -ge 1 ]; then
          echo "Deployment already has ${AVAILABLE_REPLICAS} available replica(s), treating rollout as successful."
          exit 0
        fi
        if [ -n "$POD_NAME" ]; then
          kubectl describe pod "$POD_NAME" -n "${TARGET_NAMESPACE}" || true
          kubectl logs "$POD_NAME" -n "${TARGET_NAMESPACE}" --all-containers=true || true
          kubectl logs "$POD_NAME" -n "${TARGET_NAMESPACE}" --previous --all-containers=true || true
        fi
        exit 1
      fi
  artifacts:
    paths:
      - output/*
      - kube/*
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
    - when: never
